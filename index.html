<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GabaritAI – Seus Concursos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f8fafc;
    color: #1e293b;
}

header {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 16px;
}

.header-container {
    max-width: 1100px;
    margin: auto;
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo {
    width: 40px;
    height: 40px;
    background: #0d9488;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
}

.title {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 700;
}

.subtitle {
    font-size: 12px;
    color: #94a3b8;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 24px 16px;
}

h1 {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
}

.card {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.15s;
}

.card:hover {
    border-color: #0d9488;
    transform: translateY(-2px);
}

.card-title {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 6px;
}

.card-info {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 12px;
}

.badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    background: #ccfbf1;
    color: #0f766e;
    padding: 3px 8px;
    border-radius: 6px;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <div class="header-container">
        <div class="logo">G</div>
        <div>
            <div class="title">GabaritAI</div>
            <div class="subtitle">Organize, estude e gabarite</div>
        </div>
    </div>
</header>

<div class="container">

    <h1>Escolha seu concurso</h1>

    <div class="grid">

        <!-- ACS -->
        <div class="card" onclick="goTo('acs-tremembe')">
            <div class="card-title">ACS Tremembé 2026</div>
            <div class="card-info">Prefeitura • VUNESP</div>
            <span class="badge">Nível Médio</span>
        </div>

        <!-- EXEMPLO FUTURO -->
        <div class="card" onclick="goTo('tjsp-escrevente')">
            <div class="card-title">TJSP Escrevente</div>
            <div class="card-info">Tribunal de Justiça • VUNESP</div>
            <span class="badge">Nível Médio</span>
        </div>

    </div>

    <div class="footer">
        Plataforma em desenvolvimento • Estude com consistência
    </div>

</div>

<script>
function goTo(slug) {
    window.location.href = `/${slug}/index.html`;
}
</script>

</body>
</html>
